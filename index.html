<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>速美嘉房产AI助手</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: #f5f7fa;
    }

    header {
      background: #111827;
      color: white;
      padding: 20px;
      font-size: 20px;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      background: white;
      border-radius: 10px;
      padding: 20px;
    }

    .chat {
      height: 400px;
      overflow-y: auto;
      background: #f1f5f9;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
    }

    .user {
      background: #111827;
      color: white;
      text-align: right;
    }

    .bot {
      background: white;
      border: 1px solid #ddd;
    }

    textarea {
      width: 100%;
      height: 80px;
      border-radius: 8px;
      border: 1px solid #ccc;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      background: #111827;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    select, input {
      width: 100%;
      margin-top: 5px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .config {
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<header>🏠 速美嘉房产 AI 助手</header>

<div class="container">

  <div class="config">
    <label>选择模型：</label>
    <select id="provider">
      <option value="kimi">Kimi</option>
      <option value="doubao">豆包</option>
      <option value="qwen">千问</option>
    </select>

    <label>API Key：</label>
    <input id="apikey" placeholder="填你的 API Key" />

    <label>模型名（豆包填 ep-xxx）：</label>
    <input id="model" placeholder="比如 kimi-k2.5 / qwen-plus / ep-xxx" />
  </div>

  <div class="chat" id="chat"></div>

  <textarea id="input" placeholder="输入房源信息 / 文案需求"></textarea>
  <button onclick="send()">发送</button>

</div>

<script>

let chat = document.getElementById("chat")

function addMsg(text, cls){
  let div = document.createElement("div")
  div.className = "msg " + cls
  div.innerText = text
  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}

async function send(){
  let text = document.getElementById("input").value
  if(!text) return

  addMsg(text,"user")
  document.getElementById("input").value=""

  let provider = document.getElementById("provider").value
  let key = document.getElementById("apikey").value
  let model = document.getElementById("model").value

  let base = {
    kimi:"https://api.moonshot.ai/v1",
    doubao:"https://ark.cn-beijing.volces.com/api/v3",
    qwen:"https://dashscope.aliyuncs.com/compatible-mode/v1"
  }[provider]

  addMsg("AI思考中...","bot")

  try{
    let res = await fetch(base + "/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + key
      },
      body:JSON.stringify({
        model:model,
        messages:[
          {role:"system",content:"你是速美嘉房产AI助手，擅长写房源文案和销售话术"},
          {role:"user",content:text}
        ]
      })
    })

    let data = await res.json()

    let reply = data?.choices?.[0]?.message?.content || "返回失败"

    chat.lastChild.remove()
    addMsg(reply,"bot")

  }catch(e){
    chat.lastChild.remove()
    addMsg("请求失败："+e.message,"bot")
  }
}

</script>

</body>
</html>
